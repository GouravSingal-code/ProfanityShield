version: "3.9"

services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      PORT: 5000
      CORS_ORIGINS: http://localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
